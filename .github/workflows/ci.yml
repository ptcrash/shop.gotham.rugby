name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Shopify Theme Check
        uses: shopify/theme-check-action@v2
        with:
          theme_root: "."
          token: ${{ github.token }}

  validate-json:
    name: Validate JSON (templates, config, locales, groups)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: python3 .github/scripts/validate_json.py
